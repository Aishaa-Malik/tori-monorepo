<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriate - Instant Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div id="status-container" class="text-center p-6">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
        
        <h1 id="status-text" class="text-xl font-semibold text-gray-800">Verifying your booking...</h1>
        <p id="sub-text" class="text-gray-500 mt-2">This will only take a second.</p>
        
        <div id="fallback-container" class="hidden mt-6">
            <p class="text-sm text-red-500 mb-4">We couldn't find your active booking.</p>
            <a href="https://wa.me/YOUR_BOT_NUMBER" class="bg-green-500 text-white px-6 py-3 rounded-lg font-medium shadow-md">
                Contact Support on WhatsApp
            </a>
        </div>
    </div>

    <script>
        async function handleCheckin() {
            const statusText = document.getElementById('status-text');
            const subText = document.getElementById('sub-text');
            const fallback = document.getElementById('fallback-container');

            // 1. Get Venue ID from URL (e.g., ?venue=WEST_CLINIC_01)
            const urlParams = new URLSearchParams(window.location.search);
            const venueId = urlParams.get('venue');

            // 2. Get User ID from the Cookie dropped during the Rs 50 payment
            const userId = document.cookie
                .split('; ')
                .find(row => row.startsWith('tori_user_id='))
                ?.split('=')[1];

            if (!userId) {
                statusText.innerText = "Identification Failed";
                subText.innerText = "Please ensure you have booked via WhatsApp first.";
                fallback.classList.remove('hidden');
                return;
            }

            try {
                statusText.innerText = "Calculating balance...";
                
                // 3. Call your n8n Webhook
                const response = await fetch('https://aishaaaaaaaaaaa.app.n8n.cloud/webhook/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        venueId: venueId || 'GENERAL_VENUE'
                    })
                });

                if (!response.ok) throw new Error('Failed to fetch payment link');

                const data = await response.json();

                // 4. Redirect to the Razorpay UPI Link
                if (data.short_url) {
                    statusText.innerText = "Opening Paytm/UPI...";
                    subText.innerText = "Redirecting to secure payment...";
                    // Using replace ensures the user doesn't go back to this loading page
                    window.location.replace(data.short_url);
                } else {
                    throw new Error('No payment link returned');
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "Something went wrong";
                subText.innerText = "Please try scanning again or ask the receptionist.";
                fallback.classList.remove('hidden');
            }
        }

        // Run the check-in logic on page load
        window.onload = handleCheckin;
    </script>
</body>
</html>
