<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriate - Instant Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #10B981; /* Toriate Green */
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div id="status-container" class="text-center p-8 max-w-md w-full">
        <div id="loader-icon" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-6 mx-auto"></div>
        
        <h1 id="status-text" class="text-2xl font-bold text-gray-900">Verifying Booking...</h1>
        <p id="sub-text" class="text-gray-500 mt-2 text-lg">This will only take a second.</p>
        
        <div id="action-container" class="hidden mt-8 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <p class="text-sm text-gray-400 uppercase tracking-widest font-semibold">Balance Due</p>
                <h2 id="total_amount-display" class="text-4xl font-black text-gray-900 mt-1">₹0.00</h2>
            </div>
            
            <button id="pay-button" class="w-full bg-[#10B981] hover:bg-[#059669] text-white text-xl font-bold py-5 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                Pay with Paytm / UPI
            </button>
            
            <p class="text-xs text-gray-400">Securely powered by Razorpay</p>
        </div>

        <div id="fallback-container" class="hidden mt-8">
            <a href="https://wa.me/919351504729" class="inline-block bg-gray-900 text-white px-8 py-4 rounded-xl font-semibold shadow-md">
                Contact Support on WhatsApp
            </a>
        </div>
    </div>

    <script>
        let paymentUrl = "";

        async function handleCheckin() {
            const statusText = document.getElementById('status-text');
            const subText = document.getElementById('sub-text');
            const loader = document.getElementById('loader-icon');
            const actionContainer = document.getElementById('action-container');
            const total_amountDisplay = document.getElementById('total_amount-display');
            const fallback = document.getElementById('fallback-container');

            const urlParams = new URLSearchParams(window.location.search);
            const venueId = urlParams.get('venue');

            const userId = document.cookie
                .split('; ')
                .find(row => row.startsWith('tori_user_id='))
                ?.split('=')[1];

            if (!userId) {
                statusText.innerText = "Check-in Failed";
                subText.innerText = "No booking cookie found. Please use the link sent on WhatsApp.";
                loader.style.display = 'none';
                fallback.classList.remove('hidden');
                return;
            }

            try {
                statusText.innerText = "Calculating Balance...";
                
                const response = await fetch('https://aishaaaaaaaaaaaa.app.n8n.cloud/webhook/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        venueId: venueId || 'GENERAL_VENUE'
                    })
                });

                if (!response.ok) throw new Error('Check-in Request Failed');

                const data = await response.json();

                if (data.short_url) {
                    paymentUrl = data.short_url;
                    
                    // Update UI for the user gesture
                    loader.style.display = 'none';
                    statusText.innerText = "Ready for Check-in";
                    subText.innerText = "Please confirm the total_amount to proceed.";
                    
                    // Razorpay sends total_amount in paise, convert to Rupees
                    const total_amountInRupees = (data.amount / 100).toFixed(2);
                    total_amountDisplay.innerText = "₹" + total_amountInRupees;
                    
                    actionContainer.classList.remove('hidden');
                } else {
                    throw new Error('No active appointment found');
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "No Booking Found";
                subText.innerText = "We couldn't find an active booking for today at this venue.";
                loader.style.display = 'none';
                fallback.classList.remove('hidden');
            }
        }

        // Handle the Pay Button Click (Bypasses Browser Restrictions)
        document.getElementById('pay-button').addEventListener('click', () => {
            if (paymentUrl) {
                // Change UI to show it's happening
                document.getElementById('pay-button').innerText = "Opening UPI...";
                document.getElementById('pay-button').disabled = true;
                
                // Physical redirect after user interaction
                window.location.href = paymentUrl;
            }
        });

        window.onload = handleCheckin;
    </script>
</body>
</html>
